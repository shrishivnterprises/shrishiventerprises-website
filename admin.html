<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel — Shri Shiv Enterprises</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:'Segoe UI',sans-serif; background:#f0f4f8; min-height:100vh; }

  /* LOGIN */
  #loginScreen {
    display:flex; align-items:center; justify-content:center;
    min-height:100vh; background:linear-gradient(135deg,#0A1E3C,#1a3a6b);
  }
  .login-box {
    background:#fff; border-radius:20px; padding:40px; width:90%; max-width:400px;
    box-shadow:0 20px 60px rgba(0,0,0,0.3); text-align:center;
  }
  .login-box h1 { color:#0A1E3C; font-size:1.5rem; margin-bottom:6px; }
  .login-box p { color:#666; font-size:0.9rem; margin-bottom:28px; }
  .login-box input {
    width:100%; padding:12px 16px; border:2px solid #e5e7eb; border-radius:10px;
    font-size:1rem; margin-bottom:14px; outline:none; transition:border 0.2s;
  }
  .login-box input:focus { border-color:#0A1E3C; }
  .login-btn {
    width:100%; padding:14px; background:#0A1E3C; color:#fff; border:none;
    border-radius:10px; font-size:1rem; font-weight:700; cursor:pointer;
  }
  .login-btn:hover { background:#1a3a6b; }
  .login-error { color:#dc2626; font-size:0.85rem; margin-top:8px; display:none; }

  /* ADMIN PANEL */
  #adminPanel { display:none; }

  .topbar {
    background:#0A1E3C; color:#fff; padding:14px 20px;
    display:flex; align-items:center; justify-content:space-between;
    position:sticky; top:0; z-index:100;
  }
  .topbar h1 { font-size:1.1rem; }
  .topbar span { font-size:0.8rem; color:#C9A84C; }
  .logout-btn {
    background:#C9A84C; color:#0A1E3C; border:none; padding:8px 16px;
    border-radius:20px; font-weight:700; cursor:pointer; font-size:0.85rem;
  }

  .stats-row {
    display:grid; grid-template-columns:repeat(2,1fr); gap:12px;
    padding:16px; max-width:900px; margin:0 auto;
  }
  @media(min-width:600px){ .stats-row { grid-template-columns:repeat(4,1fr); } }
  .stat-card {
    background:#fff; border-radius:14px; padding:16px; text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.06);
  }
  .stat-card .num { font-size:1.8rem; font-weight:800; color:#0A1E3C; }
  .stat-card .lbl { font-size:0.75rem; color:#666; margin-top:4px; }

  .section { max-width:900px; margin:0 auto; padding:0 16px 20px; }
  .section h2 { color:#0A1E3C; font-size:1rem; font-weight:700; margin:16px 0 10px; }

  .order-card {
    background:#fff; border-radius:14px; padding:16px; margin-bottom:12px;
    box-shadow:0 2px 8px rgba(0,0,0,0.06); border-left:4px solid #C9A84C;
  }
  .order-header { display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:8px; }
  .order-id { font-weight:800; color:#0A1E3C; font-size:1rem; }
  .order-time { font-size:0.75rem; color:#999; }
  .order-amount { font-size:1.2rem; font-weight:800; color:#C9A84C; }
  .order-body { margin-top:10px; font-size:0.85rem; color:#444; line-height:1.7; }
  .order-body strong { color:#0A1E3C; }
  .items-list { margin-top:8px; background:#f8f9fc; border-radius:8px; padding:10px 12px; }
  .items-list div { font-size:0.83rem; color:#333; padding:2px 0; }
  .wa-btn {
    display:inline-flex; align-items:center; gap:6px;
    background:#25D366; color:#fff; padding:8px 16px; border-radius:20px;
    font-size:0.82rem; font-weight:700; text-decoration:none; margin-top:10px;
  }
  .badge {
    display:inline-block; padding:3px 10px; border-radius:20px;
    font-size:0.75rem; font-weight:700;
    background:#dcfce7; color:#16a34a;
  }
  .empty { text-align:center; padding:40px; color:#999; font-size:0.9rem; }

  .refresh-btn {
    display:block; margin:0 auto 16px; background:#0A1E3C; color:#fff;
    border:none; padding:10px 24px; border-radius:20px; font-weight:700;
    cursor:pointer; font-size:0.9rem;
  }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="loginScreen">
  <div class="login-box">
    <div style="font-size:3rem;margin-bottom:12px;">🏭</div>
    <h1>Shri Shiv Enterprises</h1>
    <p>Admin Panel — Orders Dashboard</p>
    <input type="password" id="adminPass" placeholder="Enter Admin Password" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">Login →</button>
    <div class="login-error" id="loginErr">❌ Wrong password!</div>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">
  <div class="topbar">
    <div>
      <h1>🏭 Shri Shiv Enterprises</h1>
      <span>Admin Orders Panel</span>
    </div>
    <button class="logout-btn" onclick="doLogout()">Logout</button>
  </div>

  <div class="stats-row" id="statsRow">
    <div class="stat-card"><div class="num" id="statTotal">0</div><div class="lbl">Total Orders</div></div>
    <div class="stat-card"><div class="num" id="statRevenue">₹0</div><div class="lbl">Total Revenue</div></div>
    <div class="stat-card"><div class="num" id="statToday">0</div><div class="lbl">Today's Orders</div></div>
    <div class="stat-card"><div class="num" id="statItems">0</div><div class="lbl">Items Sold</div></div>
  </div>

  <div class="section">
    <h2>📦 All Orders (Latest First)</h2>
    <button class="refresh-btn" onclick="loadOrders()">🔄 Refresh Orders</button>
    <div id="ordersList"></div>
  </div>
</div>

<script>
const ADMIN_PASSWORD = 'shrishiv2025';
const ORDERS_URL = 'https://raw.githubusercontent.com/shrishivnterprises/shrishiventerprises-website/main/orders_log.json?t=' + Date.now();

function doLogin() {
  const pass = document.getElementById('adminPass').value;
  if (pass === ADMIN_PASSWORD) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminPanel').style.display = 'block';
    sessionStorage.setItem('sse_admin', '1');
    loadOrders();
  } else {
    document.getElementById('loginErr').style.display = 'block';
  }
}

function doLogout() {
  sessionStorage.removeItem('sse_admin');
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('adminPanel').style.display = 'none';
  document.getElementById('adminPass').value = '';
}

// Auto-login if session exists
if (sessionStorage.getItem('sse_admin')) {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminPanel').style.display = 'block';
  loadOrders();
}

async function loadOrders() {
  const listEl = document.getElementById('ordersList');
  listEl.innerHTML = '<div class="empty">Loading orders...</div>';

  try {
    const res = await fetch('https://raw.githubusercontent.com/shrishivnterprises/shrishiventerprises-website/main/orders_log.json?t=' + Date.now());
    const orders = await res.json();

    // Sort latest first
    orders.sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));

    // Stats
    const today = new Date().toDateString();
    const todayOrders = orders.filter(o => new Date(o.timestamp).toDateString() === today);
    const totalRevenue = orders.reduce((s,o) => s + (o.total||0), 0);
    const totalItems = orders.reduce((s,o) => s + (o.items||[]).reduce((si,i) => si + (i.qty||1), 0), 0);

    document.getElementById('statTotal').textContent = orders.length;
    document.getElementById('statRevenue').textContent = '₹' + totalRevenue.toLocaleString('en-IN');
    document.getElementById('statToday').textContent = todayOrders.length;
    document.getElementById('statItems').textContent = totalItems;

    if (orders.length === 0) {
      listEl.innerHTML = '<div class="empty">📭 Abhi koi order nahi hai</div>';
      return;
    }

    listEl.innerHTML = orders.map(o => {
      const dt = new Date(o.timestamp);
      const dateStr = dt.toLocaleDateString('en-IN', {day:'2-digit',month:'short',year:'numeric'});
      const timeStr = dt.toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit',hour12:true});

      const itemsHtml = (o.items||[]).map(i =>
        `<div>• ${i.name} x${i.qty} = ₹${i.qty * i.price}</div>`
      ).join('');

      const waMsg = encodeURIComponent(
        `🛒 *Order Confirm — ${o.order_id||''}*\n\nDhanyawad ${o.name} ji! Aapka order confirm ho gaya hai.\n\n📦 Items:\n${(o.items||[]).map(i=>`• ${i.name} x${i.qty}`).join('\n')}\n\n💰 Total: ₹${o.total}\n\nHum jaldi deliver karenge. 🙏\n— Shri Shiv Enterprises`
      );

      return `
        <div class="order-card">
          <div class="order-header">
            <div>
              <div class="order-id">🛒 ${o.order_id || 'SSE-'+Date.now()}</div>
              <div class="order-time">⏰ ${dateStr}, ${timeStr}</div>
            </div>
            <div>
              <div class="order-amount">₹${o.total||0}</div>
              <span class="badge">✅ ${o.payment||'UPI'}</span>
            </div>
          </div>
          <div class="order-body">
            <strong>👤 Customer:</strong> ${o.name||'N/A'}<br>
            <strong>📞 Phone:</strong> ${o.phone||'N/A'}<br>
            <strong>📍 Address:</strong> ${o.address||''}${o.city?', '+o.city:''}${o.pincode?' - '+o.pincode:''}<br>
            ${o.email ? `<strong>✉️ Email:</strong> ${o.email}<br>` : ''}
          </div>
          <div class="items-list">${itemsHtml || '<div>No items</div>'}</div>
          <a class="wa-btn" href="https://wa.me/${o.phone ? o.phone.replace(/[^0-9]/g,'').replace(/^0/,'91') : '916393539533'}?text=${waMsg}" target="_blank">
            💬 WhatsApp Customer
          </a>
        </div>
      `;
    }).join('');

  } catch(e) {
    listEl.innerHTML = '<div class="empty">❌ Orders load nahi huye. Internet check karein.</div>';
    console.error(e);
  }
}
</script>
</body>
</html>
